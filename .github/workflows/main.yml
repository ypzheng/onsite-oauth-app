on:
  push:
    branches:
      - 'main'
      
jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Upload to PROD
        uses: HubSpot/hubspot-project-actions/project-upload@v1.1.0
        with:
          profile: "prod"
          account_id: ${{ secrets.HUBSPOT_ACCOUNT_ID }}
          personal_access_key: ${{ secrets.HUBSPOT_PERSONAL_ACCESS_KEY }}
